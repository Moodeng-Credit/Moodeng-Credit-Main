name: Build Check

on:
   push:
      branches: ['**']
   pull_request:
      branches: ['**']

jobs:
   build:
      runs-on: ubuntu-latest

      strategy:
         matrix:
            node-version: [24.x]

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Setup Node.js ${{ matrix.node-version }}
           uses: actions/setup-node@v4
           with:
              node-version: ${{ matrix.node-version }}
              cache: 'npm'

         - name: Install dependencies
           run: npm ci

         - name: Create build environment file
           run: |
              cat > .env.build << 'EOF'
              NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
              NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
              SUPABASE_SECRET_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
              NEXT_PUBLIC_SITE_URL=https://localhost:3000
              NEXT_TELEMETRY_DISABLED=1
              GENERATE_SOURCEMAP=false
              CI=false
              EOF

         - name: Run build (includes linting and type checking)
           run: NODE_OPTIONS="--max-old-space-size=8192" npm run build
           env:
              NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
              NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
              SUPABASE_SECRET_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
              NEXT_PUBLIC_SITE_URL: https://localhost:3000
              NEXT_TELEMETRY_DISABLED: 1
              GENERATE_SOURCEMAP: 'false'
              CI: 'false'

         - name: Verify build output
           run: |
              if [ ! -d ".next" ]; then
                echo "❌ Build failed: .next directory not found"
                exit 1
              fi
              echo "✅ Build completed successfully"
